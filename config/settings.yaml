# Samantha Agent — 全局设置
# API Key 通过环境变量 DEEPSEEK_API_KEY 读取，不要写在这里

llm:
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 2048

memory:
  short_term:
    max_rounds: 20
  long_term:
    chroma_dir: ./data/chroma
    collection_name: samantha_memory
    retrieval_k: 5
    similarity_threshold: 0.5

safety:
  emotion_risk_threshold: 3
  blocked_keywords:
    - 自杀
    - 自残
    - 暴力攻击
    - suicide
    - self-harm
    - kill myself
    - kill yourself
    - end my life
  warning_keywords:
    - 抑郁
    - 焦虑
    - 失眠
    - depressed
    - anxiety
    - insomnia
    - worthless
    - hopeless

dialogue:
  max_response_length: 500
  fallback_message: "我在听，你想跟我说说你的感受吗？"

logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name}:{function} | {message}"
  rotation: 10 MB
  retention: 7 days

sse:
  keepalive_interval: 30

conversation:
  db_path: ./data/conversations.db

frontend:
  port: 3000
  max_message_length: 10000
  max_response_length: 500
  title_max_length: 100
  default_title: New Chat
