# 工具配置
# 每个工具的 name 必须与 src/tools/registry.py 中的定义一致
# enabled: true 表示工具可用

tools:
  - name: search_memories
    description: 搜索 Samantha 的长期记忆库。当用户提到过去的事情、询问偏好或个人信息时使用。
    enabled: true
    parameters:
      query:
        type: string
        description: 搜索关键词
      k:
        type: integer
        default: 5

  - name: record_emotion
    description: 记录用户的情绪日记。当用户表达强烈情绪或主动要求记录心情时使用。
    enabled: true
    parameters:
      label:
        type: string
        description: 情绪标签
      note:
        type: string
        description: 备注文字

  - name: set_reminder
    description: 设置一个日程提醒。当用户说"提醒我"、"帮我记一下"时使用。
    enabled: true
    parameters:
      message:
        type: string
        description: 提醒内容
      time:
        type: string
        description: 提醒时间，ISO格式

  - name: list_reminders
    description: 列出所有待办提醒。当用户询问"有什么提醒"或"我的日程"时使用。
    enabled: true
    parameters: {}

  - name: recommend_music
    description: 根据当前情绪推荐音乐。当用户感到无聊、需要安慰或想要听歌时使用。
    enabled: true
    parameters:
      emotion_label:
        type: string
        description: 情绪标签

  - name: get_weather
    description: 查询指定城市的当前天气。当用户询问天气信息时使用。
    enabled: true
    parameters:
      city:
        type: string
        description: 城市名称
